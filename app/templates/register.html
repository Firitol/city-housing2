{% extends 'base.html' %}
{% block title %}Register | Hosana City Housing{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-3">Government Staff Registration</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Full Name</label>
            <input class="form-control" name="full_name" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input class="form-control" name="username" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Role</label>
            <select class="form-select" name="role" required>
              <option value="staff">Staff Worker</option>
              <option value="mayor">Mayor</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input class="form-control" type="password" name="password" minlength="6" required />
          </div>
          <button class="btn btn-primary w-100" type="submit">Create Account</button>
        </form>
        <p class="mt-3 mb-0">Already registered? <a href="{{ url_for('auth.login') }}">Login</a>.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
