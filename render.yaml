services:
  - type: web
    name: hosana-city-housing
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: hosana-city-housing-db
          property: connectionString

databases:
  - name: hosana-city-housing-db
    databaseName: hosana_city_housing
    user: hosana_admin
